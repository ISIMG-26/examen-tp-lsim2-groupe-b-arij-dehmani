<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Connexion AJAX</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>
<h2>🧪 Test de Connexion AJAX</h2>

<div>
    <h3>Test 1: Connexion Admin</h3>
    <button onclick="testLogin('admin@coffeshop.com', 'admin123')">Tester connexion admin</button>
</div>

<div>
    <h3>Résultat:</h3>
    <div id="result" class="result"></div>
</div>

<div>
    <h3>Response JSON:</h3>
    <textarea id="response"></textarea>
</div>

<script>
async function testLogin(email, password) {
    const resultDiv = document.getElementById('result');
    const responseDiv = document.getElementById('response');
    
    resultDiv.innerHTML = '⏳ Envoi de la requête...';
    
    try {
        const fd = new FormData();
        fd.append('action', 'connexion');
        fd.append('email', email);
        fd.append('password', password);
        
        const res = await fetch('back/auth_handler.php', { 
            method: 'POST', 
            body: fd 
        });
        
        console.log('Status:', res.status);
        const text = await res.text();
        console.log('Response text:', text);
        
        responseDiv.value = text;
        
        try {
            const data = JSON.parse(text);
            if (data.success) {
                resultDiv.innerHTML = '<div class="success">✅ Connexion réussie!<br>' + data.message + '</div>';
            } else {
                resultDiv.innerHTML = '<div class="error">❌ Connexion échouée<br>' + data.message + '</div>';
            }
        } catch (e) {
            resultDiv.innerHTML = '<div class="error">❌ Erreur JSON parse: ' + e.message + '</div>';
        }
    } catch (e) {
        resultDiv.innerHTML = '<div class="error">❌ Erreur réseau: ' + e.message + '</div>';
        responseDiv.value = e.message;
    }
}
</script>

</body>
</html>
